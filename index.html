<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STALKER Тест-тренажер</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #f3f3f3;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2d2d2d;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.45;
      color: #c9c9c9;
    }
    .btn {
      display: inline-block;
      background: #2e7d32;
      color: #fff;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: bold;
    }
    .muted {
      margin-top: 12px;
      font-size: 14px;
      color: #9e9e9e;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>STALKER: Тест-тренажер</h1>
    <p>Нажмите кнопку ниже, чтобы открыть тренажер в браузере на GitHub Pages.</p>
    <a class="btn" id="openTrainer" href="#">Открыть тренажер</a>
    <p class="muted">Если кнопка не сработала, откройте файл <code>Тест монстры.html</code> напрямую в репозитории.</p>
  </main>

  <script>
    const trainerFile = "Тест монстры.html";
    document.getElementById("openTrainer").href = encodeURI(trainerFile);
  </script>
</body>
</html>
